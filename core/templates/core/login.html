{% extends "core/base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="auth-shell">
    <div class="auth-card">
        <a href="{% url 'login' %}" class="brand-mark">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            SecureApp
        </a>
        <h1 class="h4 mb-1">Welcome back</h1>
        <p class="text-muted mb-4">Enter your password, then we'll send a one-time code to your Telegram.</p>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                {{ form.username }}
            </div>
            <div class="mb-4">
                <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-brand text-white w-100 py-2">Continue</button>
        </form>

        <p class="text-center text-muted small mt-4 mb-0">
            New here? <a href="{% url 'signup' %}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
